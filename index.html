<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程项目管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; background: #ffffff; margin: 0; padding: 0; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-white min-h-screen">
    <div class="max-w-7xl mx-auto">
        
        <!-- 顶部栏 -->
        <div class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center shadow-sm">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center text-white font-bold text-lg shadow-md">
                    工
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-900 leading-tight">工程管理系统</h1>
                    <div class="flex items-center space-x-2 text-[11px] text-gray-500">
                        <span id="sync-status" class="flex items-center">
                            <span class="w-1.5 h-1.5 bg-gray-400 rounded-full mr-1.5"></span>
                            未连接
                        </span>
                        <span class="text-gray-300">|</span>
                        <span id="record-count">0 个项目</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="refreshData()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors" title="刷新">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button onclick="openModal()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm flex items-center space-x-1.5 transition-all hover:shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>新建</span>
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 p-4 bg-gray-50/50">
            <div class="bg-white rounded-xl p-4 border border-gray-200 shadow-sm">
                <p class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider mb-1">项目总数</p>
                <p class="text-2xl font-bold text-gray-900" id="stat-count">-</p>
            </div>
            <div class="bg-emerald-50 rounded-xl p-4 border border-emerald-200 shadow-sm">
                <p class="text-[11px] font-semibold text-emerald-600 uppercase tracking-wider mb-1">工程总款</p>
                <p class="text-2xl font-bold text-emerald-700" id="stat-amount">-</p>
            </div>
            <div class="bg-rose-50 rounded-xl p-4 border border-rose-200 shadow-sm">
                <p class="text-[11px] font-semibold text-rose-600 uppercase tracking-wider mb-1">总支出</p>
                <p class="text-2xl font-bold text-rose-700" id="stat-expense">-</p>
            </div>
            <div class="bg-blue-50 rounded-xl p-4 border border-blue-200 shadow-sm">
                <p class="text-[11px] font-semibold text-blue-600 uppercase tracking-wider mb-1">结余</p>
                <p class="text-2xl font-bold text-blue-700" id="stat-balance">-</p>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="px-4 py-3 border-b border-gray-200 bg-white flex items-center space-x-2 overflow-x-auto">
            <span class="text-xs text-gray-500 whitespace-nowrap font-medium">筛选:</span>
            <button onclick="filterProjects('all')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-gray-900 text-white shadow-sm" data-filter="all">全部</button>
            <button onclick="filterProjects('备案')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 transition-colors" data-filter="备案">备案</button>
            <button onclick="filterProjects('验槽')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100 transition-colors" data-filter="验槽">验槽</button>
            <button onclick="filterProjects('验收')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 transition-colors" data-filter="验收">验收</button>
            <button onclick="filterProjects('completed')" class="filter-btn px-3 py-1.5 rounded-full text-xs font-medium bg-purple-50 text-purple-700 border border-purple-200 hover:bg-purple-100 transition-colors" data-filter="completed">已完工</button>
            <div class="flex-1"></div>
            <div class="relative">
                <input type="text" id="search-input" oninput="renderTable()" placeholder="搜索项目..." 
                    class="pl-8 pr-3 py-1.5 text-xs border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-36 lg:w-48">
                <svg class="w-3.5 h-3.5 text-gray-400 absolute left-2.5 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="overflow-x-auto bg-white">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                    <tr>
                        <th class="px-4 py-3 text-left w-12">序号</th>
                        <th class="px-4 py-3 text-left w-24">日期</th>
                        <th class="px-4 py-3 text-left min-w-[180px]">项目名称</th>
                        <th class="px-4 py-3 text-right w-28">工程款</th>
                        <th class="px-4 py-3 text-right w-28">支出</th>
                        <th class="px-4 py-3 text-right w-28">结余</th>
                        <th class="px-4 py-3 text-center w-24">进展</th>
                        <th class="px-4 py-3 text-left min-w-[120px]">备注</th>
                        <th class="px-4 py-3 text-center w-16">操作</th>
                    </tr>
                </thead>
                <tbody id="project-list" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="9" class="px-4 py-12 text-center text-gray-500">
                            <div class="loading mr-2"></div>
                            正在连接 Airtable...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden py-12 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-3">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </div>
            <p class="text-gray-500 text-sm">暂无项目数据</p>
            <button onclick="openModal()" class="mt-3 text-blue-600 text-sm font-medium hover:text-blue-700">创建第一个项目 →</button>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="modal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white">
                <h3 class="font-bold text-lg text-gray-900" id="modal-title">新建项目</h3>
                <button onclick="closeModal()" class="p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="project-form" class="p-6 space-y-4" onsubmit="saveProject(event)">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">日期 <span class="text-red-500">*</span></label>
                        <input type="date" id="input-date" required 
                            class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">项目名称 <span class="text-red-500">*</span></label>
                        <input type="text" id="input-name" required placeholder="输入项目名称" 
                            class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">工程款 (¥)</label>
                        <input type="number" id="input-amount" step="0.01" placeholder="0.00" 
                            class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1.5">支出 (¥)</label>
                        <input type="number" id="input-expense" step="0.01" value="0" 
                            class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-2">当前进展</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer relative">
                            <input type="radio" name="status" value="备案" class="hidden peer" checked>
                            <div class="text-center py-2.5 rounded-lg border-2 border-gray-200 peer-checked:border-amber-500 peer-checked:bg-amber-50 text-sm font-medium text-gray-700 peer-checked:text-amber-700 transition-all">
                                备案
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="status" value="验槽" class="hidden peer">
                            <div class="text-center py-2.5 rounded-lg border-2 border-gray-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 text-sm font-medium text-gray-700 peer-checked:text-blue-700 transition-all">
                                验槽
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="radio" name="status" value="验收" class="hidden peer">
                            <div class="text-center py-2.5 rounded-lg border-2 border-gray-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-sm font-medium text-gray-700 peer-checked:text-emerald-700 transition-all">
                                验收
                            </div>
                        </label>
                    </div>
                </div>
                <div class="flex items-center bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <input type="checkbox" id="input-completed" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="input-completed" class="ml-2 text-sm text-gray-700 font-medium">标记为已完工</label>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1.5">备注</label>
                    <textarea id="input-notes" rows="3" placeholder="添加备注信息..." 
                        class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm resize-none"></textarea>
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeModal()" 
                        class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                        class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-md hover:shadow-lg transition-all">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Airtable 配置
        const CONFIG = {
            token: 'patHv1YsHbCilmF1c.43b6403e1293fb1690159572d7edaeb4f110e7a4f8dff31b7523e65f95954206',
            baseId: 'appOo2q3wlyeIRpxh',
            tableName: 'Projects'
        };

        let projects = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('input-date').valueAsDate = new Date();
            loadData();
        });

        async function airtableRequest(method, endpoint = '', data = null) {
            const url = `https://api.airtable.com/v0/${CONFIG.baseId}/${CONFIG.tableName}${endpoint}`;
            const options = {
                method: method,
                headers: {
                    'Authorization': `Bearer ${CONFIG.token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (data) options.body = JSON.stringify(data);
            
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(await response.text());
            return await response.json();
        }

        async function loadData() {
            updateSyncStatus('syncing');
            try {
                const data = await airtableRequest('GET');
                projects = data.records.map(r => ({
                    id: r.id,
                    name: r.fields.Name || '',
                    date: r.fields.Date || '',
                    amount: r.fields.Amount || 0,
                    expense: r.fields.Expense || 0,
                    status: r.fields.Status || '备案',
                    completed: r.fields.Completed || false,
                    notes: r.fields.Notes || ''
                }));
                renderTable();
                updateStats();
                updateSyncStatus('synced');
            } catch (error) {
                updateSyncStatus('error');
                document.getElementById('project-list').innerHTML = `
                    <tr><td colspan="9" class="px-4 py-8 text-center text-red-500">
                        连接失败: ${error.message}<br>
                        <button onclick="loadData()" class="mt-2 text-blue-600 underline">重试</button>
                    </td></tr>
                `;
            }
        }

        function refreshData() { loadData(); }

        function updateSyncStatus(status) {
            const el = document.getElementById('sync-status');
            const configs = {
                syncing: { color: 'bg-amber-400', text: '同步中...' },
                synced: { color: 'bg-green-500', text: '已同步' },
                error: { color: 'bg-red-500', text: '连接失败' }
            };
            const c = configs[status];
            el.innerHTML = `<span class="w-1.5 h-1.5 ${c.color} rounded-full mr-1.5"></span>${c.text}`;
        }

        function renderTable() {
            const tbody = document.getElementById('project-list');
            const emptyState = document.getElementById('empty-state');
            
            let filtered = projects;
            if (currentFilter !== 'all') {
                if (currentFilter === 'completed') {
                    filtered = projects.filter(p => p.completed);
                } else {
                    filtered = projects.filter(p => p.status === currentFilter && !p.completed);
                }
            }

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));

            filtered.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return new Date(b.date) - new Date(a.date);
            });

            document.getElementById('record-count').textContent = `${filtered.length} 个项目`;

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            tbody.innerHTML = filtered.map((p, index) => {
                const balance = p.amount - p.expense;
                const statusColors = {
                    '备案': 'bg-amber-100 text-amber-800 border-amber-200',
                    '验槽': 'bg-blue-100 text-blue-800 border-blue-200',
                    '验收': 'bg-emerald-100 text-emerald-800 border-emerald-200'
                };
                
                return `
                    <tr class="hover:bg-gray-50 transition-colors ${p.completed ? 'bg-gray-50/60' : ''} fade-in">
                        <td class="px-4 py-3 font-medium text-gray-900">${index + 1}</td>
                        <td class="px-4 py-3 text-gray-600 text-xs">${p.date}</td>
                        <td class="px-4 py-3">
                            <div class="font-medium ${p.completed ? 'line-through text-gray-400' : 'text-gray-900'}">${p.name}</div>
                            ${p.completed ? '<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-purple-100 text-purple-700 mt-0.5">已完工</span>' : ''}
                        </td>
                        <td class="px-4 py-3 text-right font-semibold text-emerald-600">¥${p.amount.toLocaleString()}</td>
                        <td class="px-4 py-3 text-right font-semibold text-rose-600">¥${p.expense.toLocaleString()}</td>
                        <td class="px-4 py-3 text-right font-bold ${balance >= 0 ? 'text-blue-600' : 'text-rose-600'}">¥${balance.toLocaleString()}</td>
                        <td class="px-4 py-3 text-center">
                            ${!p.completed ? `
                                <select onchange="updateStatus('${p.id}', this.value)" 
                                    class="text-xs font-semibold px-2.5 py-1 rounded-full border ${statusColors[p.status]} outline-none cursor-pointer hover:shadow-sm transition-shadow">
                                    <option value="备案" ${p.status === '备案' ? 'selected' : ''}>备案</option>
                                    <option value="验槽" ${p.status === '验槽' ? 'selected' : ''}>验槽</option>
                                    <option value="验收" ${p.status === '验收' ? 'selected' : ''}>验收</option>
                                </select>
                            ` : '<span class="text-xs px-2.5 py-1 rounded-full bg-purple-100 text-purple-700 border border-purple-200 font-medium">已完工</span>'}
                        </td>
                        <td class="px-4 py-3 text-gray-600 text-xs truncate max-w-[120px]" title="${p.notes}">${p.notes || '-'}</td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex justify-center space-x-1">
                                <button onclick="editProject('${p.id}')" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="编辑">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                </button>
                                <button onclick="deleteProject('${p.id}')" class="p-1.5 text-gray-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="删除">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats() {
            const totalAmount = projects.reduce((sum, p) => sum + p.amount, 0);
            const totalExpense = projects.reduce((sum, p) => sum + p.expense, 0);
            const balance = totalAmount - totalExpense;
            
            document.getElementById('stat-count').textContent = projects.length;
            document.getElementById('stat-amount').textContent = `¥${(totalAmount/10000).toFixed(2)}万`;
            document.getElementById('stat-expense').textContent = `¥${(totalExpense/10000).toFixed(2)}万`;
            document.getElementById('stat-balance').textContent = `¥${(balance/10000).toFixed(2)}万`;
        }

        function filterProjects(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.filter === filter;
                btn.classList.toggle('ring-2', isActive);
                btn.classList.toggle('ring-offset-1', isActive);
                btn.classList.toggle('ring-gray-400', isActive);
            });
            renderTable();
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = '新建项目';
            document.getElementById('project-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('input-date').valueAsDate = new Date();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        async function saveProject(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const fields = {
                Name: document.getElementById('input-name').value,
                Date: document.getElementById('input-date').value,
                Amount: parseFloat(document.getElementById('input-amount').value) || 0,
                Expense: parseFloat(document.getElementById('input-expense').value) || 0,
                Status: document.querySelector('input[name="status"]:checked').value,
                Completed: document.getElementById('input-completed').checked,
                Notes: document.getElementById('input-notes').value
            };

            updateSyncStatus('syncing');
            try {
                if (id) {
                    await airtableRequest('PATCH', `/${id}`, { fields });
                } else {
                    await airtableRequest('POST', '', { fields });
                }
                closeModal();
                await loadData();
            } catch (error) {
                alert('保存失败：' + error.message);
                updateSyncStatus('error');
            }
        }

        function editProject(id) {
            const p = projects.find(p => p.id === id);
            if (!p) return;

            document.getElementById('edit-id').value = p.id;
            document.getElementById('input-date').value = p.date;
            document.getElementById('input-name').value = p.name;
            document.getElementById('input-amount').value = p.amount;
            document.getElementById('input-expense').value = p.expense;
            document.getElementById('input-notes').value = p.notes || '';
            document.getElementById('input-completed').checked = p.completed;
            
            document.querySelectorAll('input[name="status"]').forEach(r => {
                r.checked = r.value === p.status;
            });

            document.getElementById('modal-title').textContent = '编辑项目';
            document.getElementById('modal').classList.remove('hidden');
        }

        async function deleteProject(id) {
            if (!confirm('确定删除该项目？')) return;
            
            updateSyncStatus('syncing');
            try {
                await airtableRequest('DELETE', `/${id}`);
                await loadData();
            } catch (error) {
                alert('删除失败');
                updateSyncStatus('error');
            }
        }

        async function updateStatus(id, status) {
            updateSyncStatus('syncing');
            try {
                await airtableRequest('PATCH', `/${id}`, { fields: { Status: status } });
                await loadData();
            } catch (error) {
                alert('更新失败');
                updateSyncStatus('error');
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
